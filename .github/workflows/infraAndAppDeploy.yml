name: Validate, deploy infrastructure, and promote Function app

on:
  pull_request:
    branches:
      - main
      - test
  push:
    branches:
      - main
      - test
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: rotary-email-forwarding-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_VERSION: 10.0.x
  FUNCTION_PROJECT: code/RotaryEmailForwarding.FunctionApp/RotaryEmailForwarding.FunctionApp.csproj
  TEST_PROJECT: code/RotaryEmailForwarding.Tests/RotaryEmailForwarding.Tests.csproj
  ARTIFACT_NAME: functionapp-package

jobs:
  validate:
    name: Restore, build, and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.TEST_PROJECT }}

      - name: Build
        run: dotnet build ${{ env.TEST_PROJECT }} --configuration Release --no-restore

      - name: Test
        run: dotnet test ${{ env.TEST_PROJECT }} --configuration Release --no-build --logger trx

      - name: Validate Bicep syntax
        run: az bicep build --file infra/main.bicep --stdout > /dev/null

      - name: Validate Bicep parameter files
        run: |
          az bicep build-params --file infra/params/parameters.test.bicepparam --stdout > /dev/null
          az bicep build-params --file infra/params/parameters.prod.bicepparam --stdout > /dev/null

  package:
    name: Build immutable release artifact
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish Function app
        run: dotnet publish ${{ env.FUNCTION_PROJECT }} --configuration Release --output publish/functionapp

      - name: Create deployment zip
        run: |
          cd publish/functionapp
          zip -r ../functionapp.zip .

      - name: Upload release artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: publish/functionapp.zip
          if-no-files-found: error
          retention-days: 30

  deploy-test:
    name: Deploy test
    runs-on: ubuntu-latest
    needs: package
    if: github.ref == 'refs/heads/test'
    environment: test
    env:
      AZURE_RESOURCE_GROUP: TestRotaryEmailForwarding
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download release artifact
        uses: actions/download-artifact@v5
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: publish

      - name: Verify Azure deployment settings
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          : "${AZURE_CLIENT_ID:?Missing AZURE_CLIENT_ID environment secret}"
          : "${AZURE_TENANT_ID:?Missing AZURE_TENANT_ID environment secret}"
          : "${AZURE_SUBSCRIPTION_ID:?Missing AZURE_SUBSCRIPTION_ID environment secret}"
          : "${AZURE_RESOURCE_GROUP:?Missing AZURE_RESOURCE_GROUP job setting}"

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy infrastructure
        id: infra
        run: |
          deployment_name="rotary-email-forwarding-test-${GITHUB_RUN_NUMBER}"
          az deployment group create \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --name "$deployment_name" \
            --mode Incremental \
            --template-file infra/main.bicep \
            --parameters infra/params/parameters.test.bicepparam
          function_name=$(az deployment group show \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --name "$deployment_name" \
            --query properties.outputs.functionAppName.value \
            --output tsv)
          echo "function_name=$function_name" >> "$GITHUB_OUTPUT"

      - name: Verify Function app settings
        run: |
          settings_json=$(az functionapp config appsettings list \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --name "${{ steps.infra.outputs.function_name }}" \
            --output json)
          settings=$(jq -r '.[].name' <<< "$settings_json")

          for required_setting in \
            AzureWebJobsStorage__credential \
            AzureWebJobsStorage__blobServiceUri \
            AzureWebJobsStorage__queueServiceUri \
            AzureWebJobsStorage__tableServiceUri \
            FUNCTIONS_WORKER_RUNTIME \
            APPLICATIONINSIGHTS_CONNECTION_STRING \
            APPLICATIONINSIGHTS_AUTHENTICATION_STRING \
            appEnvironment \
            cosmosDatabaseName \
            cosmosContainerName \
            cosmosAccountEndpoint \
            databaseConnectionString \
            sendingEmailAddress \
            operatorEmail \
            supportEmail \
            sendingEmailPassword \
            mailHost \
            mailPort \
            mailSecurityMode \
            emailRetryTimeZone \
            adminApiKey \
            nonProductionSafeRecipient \
            allowUnsafeNonProductionEmail \
            maxRequestBodyBytes \
            FUNCTIONS_REQUEST_BODY_SIZE_LIMIT
          do
            if ! grep -Fxq "$required_setting" <<< "$settings"; then
              echo "::error::Missing required app setting: $required_setting"
              exit 1
            fi
          done

          setting_value() {
            jq -r --arg name "$1" '.[] | select(.name == $name) | .value // empty' <<< "$settings_json"
          }

          assert_setting_value() {
            local setting_name="$1"
            local expected_value="$2"
            local actual_value
            actual_value="$(setting_value "$setting_name")"

            if [ "$actual_value" != "$expected_value" ]; then
              echo "::error::App setting $setting_name was not set to the expected Bicep-managed value."
              exit 1
            fi
          }

          assert_key_vault_reference() {
            local setting_name="$1"
            local actual_value
            actual_value="$(setting_value "$setting_name")"

            if [[ "$actual_value" != @Microsoft.KeyVault*"$setting_name"* ]]; then
              echo "::error::App setting $setting_name was not configured as the expected Key Vault reference."
              exit 1
            fi
          }

          assert_setting_value FUNCTIONS_WORKER_RUNTIME dotnet-isolated
          assert_setting_value appEnvironment test
          assert_setting_value cosmosDatabaseName EmailForwarding
          assert_setting_value cosmosContainerName TestContactInfoAndRequestsByType
          assert_setting_value mailHost smtp.gmail.com
          assert_setting_value mailPort 587
          assert_setting_value mailSecurityMode StartTls
          assert_setting_value emailRetryTimeZone "Eastern Standard Time"
          assert_setting_value allowUnsafeNonProductionEmail false
          assert_setting_value maxRequestBodyBytes 131072
          assert_setting_value FUNCTIONS_REQUEST_BODY_SIZE_LIMIT 131072

          assert_key_vault_reference databaseConnectionString
          assert_key_vault_reference sendingEmailAddress
          assert_key_vault_reference operatorEmail
          assert_key_vault_reference supportEmail
          assert_key_vault_reference sendingEmailPassword
          assert_key_vault_reference adminApiKey
          assert_key_vault_reference nonProductionSafeRecipient

      - name: Deploy same Function app package
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ steps.infra.outputs.function_name }}
          package: publish/functionapp.zip
          sku: flexconsumption
          remote-build: false

      - name: Smoke test
        run: curl --fail --show-error --silent "https://${{ steps.infra.outputs.function_name }}.azurewebsites.net/api/health"

  deploy-prod:
    name: Promote to prod
    runs-on: ubuntu-latest
    needs: package
    if: github.ref == 'refs/heads/main'
    environment: prod
    env:
      AZURE_RESOURCE_GROUP: RotaryEmailForwarding
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download release artifact
        uses: actions/download-artifact@v5
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: publish

      - name: Verify Azure deployment settings
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          : "${AZURE_CLIENT_ID:?Missing AZURE_CLIENT_ID environment secret}"
          : "${AZURE_TENANT_ID:?Missing AZURE_TENANT_ID environment secret}"
          : "${AZURE_SUBSCRIPTION_ID:?Missing AZURE_SUBSCRIPTION_ID environment secret}"
          : "${AZURE_RESOURCE_GROUP:?Missing AZURE_RESOURCE_GROUP job setting}"

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy infrastructure
        id: infra
        run: |
          deployment_name="rotary-email-forwarding-prod-${GITHUB_RUN_NUMBER}"
          az deployment group create \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --name "$deployment_name" \
            --mode Incremental \
            --template-file infra/main.bicep \
            --parameters infra/params/parameters.prod.bicepparam
          function_name=$(az deployment group show \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --name "$deployment_name" \
            --query properties.outputs.functionAppName.value \
            --output tsv)
          echo "function_name=$function_name" >> "$GITHUB_OUTPUT"

      - name: Verify Function app settings
        run: |
          settings_json=$(az functionapp config appsettings list \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --name "${{ steps.infra.outputs.function_name }}" \
            --output json)
          settings=$(jq -r '.[].name' <<< "$settings_json")

          for required_setting in \
            AzureWebJobsStorage__credential \
            AzureWebJobsStorage__blobServiceUri \
            AzureWebJobsStorage__queueServiceUri \
            AzureWebJobsStorage__tableServiceUri \
            FUNCTIONS_WORKER_RUNTIME \
            APPLICATIONINSIGHTS_CONNECTION_STRING \
            APPLICATIONINSIGHTS_AUTHENTICATION_STRING \
            appEnvironment \
            cosmosDatabaseName \
            cosmosContainerName \
            cosmosAccountEndpoint \
            databaseConnectionString \
            sendingEmailAddress \
            operatorEmail \
            supportEmail \
            sendingEmailPassword \
            mailHost \
            mailPort \
            mailSecurityMode \
            emailRetryTimeZone \
            adminApiKey \
            allowUnsafeNonProductionEmail \
            maxRequestBodyBytes \
            FUNCTIONS_REQUEST_BODY_SIZE_LIMIT
          do
            if ! grep -Fxq "$required_setting" <<< "$settings"; then
              echo "::error::Missing required app setting: $required_setting"
              exit 1
            fi
          done

          setting_value() {
            jq -r --arg name "$1" '.[] | select(.name == $name) | .value // empty' <<< "$settings_json"
          }

          assert_setting_value() {
            local setting_name="$1"
            local expected_value="$2"
            local actual_value
            actual_value="$(setting_value "$setting_name")"

            if [ "$actual_value" != "$expected_value" ]; then
              echo "::error::App setting $setting_name was not set to the expected Bicep-managed value."
              exit 1
            fi
          }

          assert_key_vault_reference() {
            local setting_name="$1"
            local actual_value
            actual_value="$(setting_value "$setting_name")"

            if [[ "$actual_value" != @Microsoft.KeyVault*"$setting_name"* ]]; then
              echo "::error::App setting $setting_name was not configured as the expected Key Vault reference."
              exit 1
            fi
          }

          assert_setting_value FUNCTIONS_WORKER_RUNTIME dotnet-isolated
          assert_setting_value appEnvironment prod
          assert_setting_value cosmosDatabaseName EmailForwarding
          assert_setting_value cosmosContainerName ContactInfoAndRequests
          assert_setting_value mailHost smtp.gmail.com
          assert_setting_value mailPort 587
          assert_setting_value mailSecurityMode StartTls
          assert_setting_value emailRetryTimeZone "Eastern Standard Time"
          assert_setting_value allowUnsafeNonProductionEmail false
          assert_setting_value maxRequestBodyBytes 131072
          assert_setting_value FUNCTIONS_REQUEST_BODY_SIZE_LIMIT 131072

          assert_key_vault_reference databaseConnectionString
          assert_key_vault_reference sendingEmailAddress
          assert_key_vault_reference operatorEmail
          assert_key_vault_reference supportEmail
          assert_key_vault_reference sendingEmailPassword
          assert_key_vault_reference adminApiKey

      - name: Deploy same Function app package
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ steps.infra.outputs.function_name }}
          package: publish/functionapp.zip
          sku: flexconsumption
          remote-build: false

      - name: Post-deploy smoke test
        run: curl --fail --show-error --silent "https://${{ steps.infra.outputs.function_name }}.azurewebsites.net/api/health"
